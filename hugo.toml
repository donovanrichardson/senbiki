baseURL = 'https://senbiki.me/'
locale = 'en-us'
title = 'Senbiki'
theme = "PaperMod"
enableGitInfo = true
[frontmatter]
date = [":git", "date", "publishDate", "lastmod"]
lastmod = ["lastmod", ":git", "date"]
publishDate = ["publishDate", "date"]
[params]
  [params.author]
    name = "Donovan Richardson"

[markup]
[markup.goldmark]
[markup.goldmark.parser]
[markup.goldmark.parser.attribute]
block = true
title = true
